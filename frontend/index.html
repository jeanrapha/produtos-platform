<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CONTROLE DE PRODUTOS - TREINAMENTO TJ/PR COTI Informática</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #4b6cb7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .brand-header {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.15), rgba(255, 255, 255, 0));
            padding: 20px;
            text-align: center;
        }
        .brand-title {
            color: #000000;
            font-weight: 800;
            letter-spacing: 0.6px;
            margin: 0;
            font-size: 1.4rem;
            text-shadow: 0 4px 18px rgba(0,0,0,0.55);
        }
        .card-body { padding: 2rem; }
        .form-label { font-weight: 600; }
        .btn-enter { width: 100%; }
        .muted { color: rgba(0, 0, 0, 0.75); }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="brand-header">
            <h1 class="brand-title">CONTROLE DE PRODUTOS</h1>
        </div>
        <div class="card-body bg-white">
            <p class="muted mb-4">Acesse sua conta</p>
            <div id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Nome de usuário</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                    </div>
                </div>
                <div class="d-grid">
                    <button type="button" class="btn btn-primary btn-enter" onclick="login()">Entrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
   
</body>
</html>
